<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>XSS SCAN | NEURAL REPORT</title>
    <style>
        :root {
            --kali-bg: #0f0f0f;
            --neon-cyan: #00f2ff;
            --danger-red: #ff3131;
            --secure-green: #00ff41;
        }

        body {
            background-color: var(--kali-bg);
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            padding: 30px;
        }

        .header {
            border: 2px solid var(--neon-cyan);
            padding: 20px;
            text-align: center;
            margin-bottom: 40px;
        }

        .status-box {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .status-danger {
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            background: rgba(255, 49, 49, 0.1);
        }

        .status-safe {
            border: 1px solid var(--secure-green);
            color: var(--secure-green);
            background: rgba(0, 255, 65, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            margin-top: 20px;
        }

        th {
            background: #252525;
            color: var(--neon-cyan);
            padding: 15px;
            border-bottom: 2px solid var(--neon-cyan);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        .payload-box {
            background: #000;
            padding: 8px;
            border-left: 3px solid #007bff;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>XSS SCAN</h1>
        <p>Target: {{ TARGET }}</p>
    </div>

    <div id="danger-status-zone">
        <!-- VULNERABLE_STATUS_PLACEHOLDER -->
    </div>


    <table>
        <thead>
            <tr>
                <th>Parameter(s)</th>
                <th>Context</th>
                <th>Payload</th>
                <th>POC</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- VULN_CARDS_PLACEHOLDER -->
        </tbody>
    </table>

    <!-- FIRST3MIN_PLACEHOLDER -->

    <h3 style="color:var(--neon-cyan); margin-top:50px;">Full Testing Matrix</h3>
    <table>
        <thead>
            <tr>
                <th>Payload Tested</th>
                <th>Result</th>
                <th>Reasoning</th>
            </tr>
        </thead>
        <tbody>
            <!-- EXECUTION_LOG_PLACEHOLDER -->
        </tbody>
    </table>
</body>

</html>
